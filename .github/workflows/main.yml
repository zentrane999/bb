name: 🚀 SEVER AI STV PREMIUM (AUTO TOOL)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian chạy Tool'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

jobs:
  Auto-Run-Tool:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    
    steps:
      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG AI
        run: |
          echo -e "\n\e[1;33m🤖 AI STV PREMIUM AUTO AGENT\e[0m"
          echo -e "\e[1;32m⚡ Powered by AI STV\e[0m"
          echo -e "\e[1;35m🕒 Thời gian treo: ${{ github.event.inputs.duration }}\e[0m"
          
          frames=('⣾' '⣽' '⣻' '⢿' '⡿' '⣟' '⣯' '⣷')
          for i in {1..10};
          do
            echo -ne "\e[1;34m\r🚀 Đang tối ưu môi trường... ${frames[i % 8]}\e[0m"
            sleep 0.1
          done
          echo -e "\e[1;32m\r✅ Hệ thống đã sẵn sàng!                    \e[0m"

      - name: 🛠️ TỰ ĐỘNG CÀI ĐẶT & CHẠY TOOLS
        run: |
          echo -e "\e[1;33m📂 Đang tải source code...\e[0m"
          git clone https://github.com/zentrane999/bb
          cd bb
          
          echo -e "\e[1;33m⚙️ Thực thi setup.sh...\e[0m"
          chmod +x setup.sh
          ./setup.sh
          
          echo -e "\e[1;33m📦 Cài đặt thư viện Python...\e[0m"
          pip install "python-socketio[client]" requests --break-system-packages
          
          echo -e "\e[1;32m🚀 Khởi chạy api.py ngầm...\e[0m"
          # Chạy ngầm và đẩy log ra file để tránh treo terminal của GitHub
          nohup python3 api.py > api.log 2>&1 &
          echo -e "\e[1;32m✅ Tool đã hoạt động! Bạn có thể điều khiển từ xa ngay bây giờ.\e[0m"

      - name: ⏳ DUY TRÌ TRẠNG THÁI HOẠT ĐỘNG
        run: |
          # Chuyển đổi thời gian input sang giây
          DURATION="${{ github.event.inputs.duration }}"
          if [ "$DURATION" = "1h" ]; then TOTAL_MIN=60;
          elif [ "$DURATION" = "3h" ]; then TOTAL_MIN=180;
          else TOTAL_MIN=340; fi
          
          TOTAL_SEC=$((TOTAL_MIN * 60))
          echo -e "\e[1;36m📍 Server sẽ duy trì trong: $TOTAL_MIN phút\e[0m"
          
          while [ $TOTAL_SEC -gt 0 ];
          do
            H=$((TOTAL_SEC / 3600))
            M=$(( (TOTAL_SEC % 3600) / 60 ))
            S=$((TOTAL_SEC % 60))
            printf "\r\e[1;36m🔄 Thời gian còn lại: %dh %dm %ds\e[0m" $H $M $S
            sleep 10
            TOTAL_SEC=$((TOTAL_SEC - 10))
          done

      - name: 🧹 KẾT THÚC PHIÊN
        if: always()
        run: |
          echo -e "\e[1;32m🎉 Đã hoàn thành thời gian chạy Tool. Tạm biệt!\e[0m"
